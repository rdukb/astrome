# Auto-generated by Firebase CLI, adjusted for frontend/ subdirectory layout
# https://github.com/firebase/firebase-tools
#
# Deployment strategy: Firebase Hosting (standard, with Next.js framework-aware
# static build). The API backend (/api/**) is proxied to Cloud Run via the
# rewrite rule in firebase.json. Firebase App Hosting (apphosting.yaml) is NOT
# used — it is present as scaffolding only and not deployed by this workflow.
name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: frontend
      - run: pnpm run build
        working-directory: frontend
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ASTROME_PROD }}
          channelId: live
          projectId: astrome-prod
