# Auto-generated by Firebase CLI, adjusted for frontend/ subdirectory layout
# https://github.com/firebase/firebase-tools
#
# Deployment strategy: Firebase Hosting (standard, with Next.js framework-aware
# static build). Firebase App Hosting (apphosting.yaml) is NOT used — it is
# present as scaffolding only and not deployed by this workflow.
name: Deploy to Firebase Hosting on PR
on: pull_request
permissions:
  checks: write
  contents: read
  pull-requests: write
jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ASTROME_PROD }}
          projectId: astrome-prod
