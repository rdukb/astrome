# Firebase App Hosting — Next.js frontend configuration
# See https://firebase.google.com/docs/app-hosting/configure

# Tell App Hosting where the Next.js app lives
appRoot: frontend

runConfig:
  minInstances: 0
  maxInstances: 10
  concurrency: 80
  cpu: 1
  memoryMiB: 512

