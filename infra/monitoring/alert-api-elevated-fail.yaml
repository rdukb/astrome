displayName: prod-api-elevated-fail
enabled: true
combiner: AND
userLabels:
  env: prod
  service: astrome-api
  severity: warning
  route: slack-warning
documentation:
  mimeType: text/markdown
  content: |
    Summary: API 5xx ratio is >= 3% for 10 minutes with enough traffic.
    Impact: Elevated failures that may degrade user trust.
    Runbook: Inspect error distribution and dependency health.
    Escalation: Triage in working hours; escalate if trend worsens.
conditions:
  - displayName: 5xx ratio >= 3% (10m)
    conditionThreshold:
      filter: |
        resource.type="cloud_run_revision"
        resource.labels.service_name="astrome-api"
        resource.labels.location="us-central1"
        metric.type="run.googleapis.com/request_count"
        metric.labels.response_code_class="5xx"
      denominatorFilter: |
        resource.type="cloud_run_revision"
        resource.labels.service_name="astrome-api"
        resource.labels.location="us-central1"
        metric.type="run.googleapis.com/request_count"
      aggregations:
        - alignmentPeriod: 600s
          perSeriesAligner: ALIGN_SUM
          crossSeriesReducer: REDUCE_SUM
      denominatorAggregations:
        - alignmentPeriod: 600s
          perSeriesAligner: ALIGN_SUM
          crossSeriesReducer: REDUCE_SUM
      comparison: COMPARISON_GT
      thresholdValue: 0.03
      duration: 600s
      trigger:
        count: 1
  - displayName: total requests >= 50 (10m)
    conditionThreshold:
      filter: |
        resource.type="cloud_run_revision"
        resource.labels.service_name="astrome-api"
        resource.labels.location="us-central1"
        metric.type="run.googleapis.com/request_count"
      aggregations:
        - alignmentPeriod: 600s
          perSeriesAligner: ALIGN_SUM
          crossSeriesReducer: REDUCE_SUM
      comparison: COMPARISON_GT
      thresholdValue: 50
      duration: 600s
      trigger:
        count: 1
alertStrategy:
  autoClose: 900s
  notificationRateLimit:
    period: 3600s
notificationChannels:
  - projects/PROJECT_ID/notificationChannels/SLACK_WARNING_CHANNEL_ID
