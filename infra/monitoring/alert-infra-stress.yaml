displayName: prod-infra-stress
enabled: true
combiner: OR
userLabels:
  env: prod
  service: astrome-api
  severity: warning
  route: slack-warning
documentation:
  mimeType: text/markdown
  content: |
    Summary: CPU or memory utilization sustained above safe thresholds.
    Impact: Increased latency and risk of request failures.
    Runbook: Inspect container utilization trend and adjust scaling/resources.
    Escalation: Create issue and assign owner if unresolved in 2 hours.
conditions:
  - displayName: memory utilization > 85% (10m)
    conditionThreshold:
      filter: |
        resource.type="cloud_run_revision"
        resource.labels.service_name="astrome-api"
        resource.labels.location="us-central1"
        metric.type="run.googleapis.com/container/memory/utilizations"
      aggregations:
        - alignmentPeriod: 60s
          perSeriesAligner: ALIGN_MEAN
          crossSeriesReducer: REDUCE_MEAN
      comparison: COMPARISON_GT
      thresholdValue: 0.85
      duration: 600s
      trigger:
        count: 1
  - displayName: CPU utilization > 80% (10m)
    conditionThreshold:
      filter: |
        resource.type="cloud_run_revision"
        resource.labels.service_name="astrome-api"
        resource.labels.location="us-central1"
        metric.type="run.googleapis.com/container/cpu/utilizations"
      aggregations:
        - alignmentPeriod: 60s
          perSeriesAligner: ALIGN_MEAN
          crossSeriesReducer: REDUCE_MEAN
      comparison: COMPARISON_GT
      thresholdValue: 0.80
      duration: 600s
      trigger:
        count: 1
alertStrategy:
  autoClose: 900s
  notificationRateLimit:
    period: 3600s
notificationChannels:
  - projects/PROJECT_ID/notificationChannels/SLACK_WARNING_CHANNEL_ID
